<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title> StudyGenie | Create Profile</title>

  <link rel="stylesheet" href="style.css" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body class="light">
  <header class="topbar">
    <h1 class="logo"> 🧞 StudyGenie 🧞 </h1>
    <button id="themeToggle" class="theme-btn">🌙 Dark</button>
  </header>

  <main class="center-wrap">
    <div class="card glow">
      <h2> Create Your Profile </h2>
      <p class="sub">Step 1 — Let's get to know you</p>

      <form id="profileForm">
        <label>Full Name</label>
        <input type="text" id="name" required placeholder="Enter your name" />

        <label>Email</label>
        <input type="email" id="email" required placeholder="you@gmail.com" />

        <label>College / University</label>
        <input type="text" id="college" required placeholder="Your College" />

        <label>Degree</label>
        <select id="degree" required>
          <option>B.Tech</option>
          <option>BCA</option>
          <option>BBA</option>
          <option>B.Com</option>
          <option>BA</option>
          <option>B.Sc</option>
          <option>M.Tech</option>
          <option>MCA</option>
          <option>MBA</option>
        </select>

        <label>Branch / Specialization </label>
        <input type="text" id="branch" required placeholder="e.g. CSE(AI & ML )" />

        <label>Year</label>
        <select id="year" required>
          <option value="">-- Select Year --</option>
          <option>1st Year</option>
          <option>2nd Year</option>
          <option>3rd Year</option>
          <option>4th Year</option>
        </select>

        <label>Study Goal (short)</label>
        <input type="text" id="goal" placeholder="e.g. Crack GATE 2027" />
        
        

    <label for="studyHours">
        ⏰ Average Daily Study Hours
    </label>

    <input
        type="number"
        id="studyHours"
        min="0"
        max="24"
        step="0.5"
        placeholder="e.g. 2"
    >

        <div class="btn-row">
          <button type="submit" class="btn primary">Save Profile 🚀</button>
          <button type="reset" class="btn ghost">Reset</button>
          
        </div>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
